<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | PoseidonUI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-panel {
            max-width: 1200px;
            margin: 100px auto;
            padding: 20px;
        }
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .admin-card {
            background: #151d27;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #1e2a3a;
        }
        .admin-card h3 {
            margin-bottom: 20px;
            color: #3498db;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            float: right;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i class="fa-solid fa-trident"></i> Poseidon Admin
        </div>
        <nav class="nav-links">
            <a href="index.html">Volver a la Web</a>
            <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
        </nav>
    </header>

    <div class="admin-panel">
        <h2>🔱 Panel de Administración Suprema</h2>
        <p>Bienvenido al centro de mando de PoseidonUI.</p>

        <div class="admin-grid">
            <!-- Estado del Bot -->
            <div class="admin-card">
                <h3><i class="fa-solid fa-server"></i> Estado del Sistema</h3>
                <div id="bot-stats-detail">
                    Cargando datos del Olimpo...
                </div>
            </div>

            <!-- Gestión de Servidores -->
            <div class="admin-card">
                <h3><i class="fa-solid fa-guild"></i> Servidores Activos</h3>
                <p>Gestiona la configuración de los reinos.</p>
                <button class="btn-outline" onclick="alert('Próximamente: Lista de servidores')">Ver Servidores</button>
            </div>

            <!-- Configuración Global -->
            <div class="admin-card">
                <h3><i class="fa-solid fa-gears"></i> Ajustes Globales</h3>
                <p>Versión del Bot: <span id="bot-version">...</span></p>
                <p>Latencia: <span id="bot-ping">...</span></p>
                <button class="cta-btn" onclick="location.reload()">Refrescar</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('poseidon_token');
        if (!token) {
            window.location.href = 'login.html';
        }

        // Configuración del bot (IP y Puerto de Teramont)
        const BOT_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? '' 
            : 'http://104.128.49.50:11111';

        async function loadStats() {
            try {
                const response = await fetch(`${BOT_URL}/api/stats`);
                const data = await response.json();
                
                document.getElementById('bot-version').innerText = data.version;
                document.getElementById('bot-ping').innerText = data.latency + 'ms';
                
                document.getElementById('bot-stats-detail').innerHTML = `
                    <p>🟢 <strong>Estado:</strong> ONLINE</p>
                    <p>🕒 <strong>Uptime desde:</strong> ${data.uptime_start}</p>
                    <p>🛡️ <strong>Servidores:</strong> ${data.guilds_count}</p>
                    <p>👥 <strong>Usuarios Totales:</strong> ${data.users_count}</p>
                `;
            } catch (err) {
                document.getElementById('bot-stats-detail').innerHTML = '<p style="color: #e74c3c;">🔴 Error: Bot desconectado o inaccesible</p>';
            }
        }

        function logout() {
            localStorage.removeItem('poseidon_token');
            window.location.href = 'index.html';
        }

        loadStats();
    </script>
</body>
</html>
