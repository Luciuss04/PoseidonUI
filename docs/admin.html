<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin | PoseidonUI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0e14;
            --card-bg: #151d27;
            --border-color: #1e2a3a;
            --accent-blue: #3498db;
            --accent-green: #2ecc71;
            --accent-red: #e74c3c;
            --text-main: #ffffff;
            --text-dim: #a0aec0;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--card-bg);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--accent-blue);
        }

        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }

        .nav-item {
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-dim);
            transition: all 0.3s;
            margin-bottom: 5px;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(52, 152, 219, 0.1);
            color: var(--accent-blue);
        }

        .logout-btn {
            margin-top: auto;
            color: var(--accent-red);
            border: 1px solid rgba(231, 76, 60, 0.2);
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            flex-grow: 1;
            padding: 40px;
        }

        .header-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .stat-card .label { color: var(--text-dim); font-size: 0.9rem; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; margin-top: 5px; }

        /* Server List */
        .server-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .server-card {
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: transform 0.3s;
        }

        .server-card:hover { transform: translateY(-5px); }

        .server-header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border-color);
        }

        .server-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .server-body { padding: 20px; }
        .server-info { margin-bottom: 15px; font-size: 0.9rem; color: var(--text-dim); }
        .server-actions { display: flex; gap: 10px; }

        .btn {
            padding: 8px 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .btn-primary { background: var(--accent-blue); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-dim); }
        .btn-outline:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

        /* Loading & Error */
        #loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-dark); display: flex; align-items: center;
            justify-content: center; z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="loader"><i class="fa-solid fa-circle-notch fa-spin fa-3x"></i></div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-logo">
            <i class="fa-solid fa-trident"></i> PoseidonUI
        </div>
        <ul class="nav-menu">
            <li class="nav-item active"><i class="fa-solid fa-chart-line"></i> Dashboard</li>
            <li class="nav-item"><i class="fa-solid fa-server"></i> Servidores</li>
            <li class="nav-item"><i class="fa-solid fa-shield-halved"></i> Seguridad</li>
            <li class="nav-item"><i class="fa-solid fa-clock-rotate-left"></i> Logs</li>
        </ul>
        <div class="nav-item logout-btn" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
        </div>
    </aside>

    <main class="main-content">
        <div class="header-stats">
            <div class="stat-card">
                <div class="label">Servidores</div>
                <div class="value" id="stat-guilds">...</div>
            </div>
            <div class="stat-card">
                <div class="label">Usuarios Protegidos</div>
                <div class="value" id="stat-users">...</div>
            </div>
            <div class="stat-card">
                <div class="label">Ping de la API</div>
                <div class="value" id="stat-ping">...</div>
            </div>
            <div class="stat-card">
                <div class="label">Uptime</div>
                <div class="value" id="stat-uptime" style="font-size: 1.2rem;">...</div>
            </div>
        </div>

        <h2 style="margin-bottom: 25px;">Lista de Reinos (Servidores)</h2>
        <div class="server-grid" id="server-list">
            <!-- Servidores cargados dinámicamente -->
        </div>
    </main>

    <script>
        const token = localStorage.getItem('poseidon_token');
        if (!token) window.location.href = 'login.html';

        const BOT_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? '' 
            : 'http://104.128.49.50:11111';

        async function apiFetch(endpoint) {
            const res = await fetch(`${BOT_URL}${endpoint}`, {
                headers: { 'Authorization': token }
            });
            if (res.status === 401) logout();
            return res.json();
        }

        function formatUptime(secs) {
            const h = Math.floor(secs / 3600);
            const m = Math.floor((secs % 3600) / 60);
            return `${h}h ${m}m activo`;
        }

        async function init() {
            try {
                const [stats, guilds] = await Promise.all([
                    apiFetch('/api/stats'),
                    apiFetch('/api/guilds')
                ]);

                // Stats
                document.getElementById('stat-guilds').innerText = stats.guilds_count;
                document.getElementById('stat-users').innerText = stats.users_count;
                document.getElementById('stat-ping').innerText = stats.latency + 'ms';
                document.getElementById('stat-uptime').innerText = formatUptime(stats.uptime_secs);

                // Guilds
                const list = document.getElementById('server-list');
                list.innerHTML = guilds.map(g => `
                    <div class="server-card">
                        <div class="server-header">
                            ${g.icon ? `<img src="${g.icon}" class="server-icon">` : `<div class="server-icon">${g.name[0]}</div>`}
                            <div>
                                <div style="font-weight: 700;">${g.name}</div>
                                <div style="font-size: 0.8rem; color: var(--text-dim);">${g.id}</div>
                            </div>
                        </div>
                        <div class="server-body">
                            <div class="server-info">
                                <div><i class="fa-solid fa-users"></i> ${g.members} miembros</div>
                                <div><i class="fa-solid fa-crown"></i> ${g.owner}</div>
                            </div>
                            <div class="server-actions">
                                <button class="btn btn-primary" onclick="alert('Configurando: ${g.name}')">Gestionar</button>
                                <button class="btn btn-outline">Ver Logs</button>
                            </div>
                        </div>
                    </div>
                `).join('');

                document.getElementById('loading-overlay').style.display = 'none';
            } catch (err) {
                console.error(err);
                alert('Error al conectar con el Olimpo. Revisa que el bot esté online.');
            }
        }

        function logout() {
            localStorage.removeItem('poseidon_token');
            window.location.href = 'index.html';
        }

        init();
    </script>
</body>
</html>
