<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin | PoseidonUI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0e14;
            --card-bg: #151d27;
            --border-color: #1e2a3a;
            --accent-blue: #3498db;
            --accent-green: #2ecc71;
            --accent-red: #e74c3c;
            --text-main: #ffffff;
            --text-dim: #a0aec0;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--card-bg);
            border-right: 1px solid var(--border-color);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--accent-blue);
        }

        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }

        .nav-item {
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-dim);
            transition: all 0.3s;
            margin-bottom: 5px;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(52, 152, 219, 0.1);
            color: var(--accent-blue);
        }

        .reboot-btn {
            margin-top: 10px;
            color: var(--accent-red);
            border: 1px solid rgba(231, 76, 60, 0.2);
            font-size: 0.9rem;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }
        .reboot-btn:hover {
            background: rgba(231, 76, 60, 0.1);
            border-color: var(--accent-red);
        }

        .logout-btn {
            margin-top: auto;
            color: var(--text-dim);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            flex-grow: 1;
            padding: 40px;
        }

        .header-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .stat-card .label { color: var(--text-dim); font-size: 0.9rem; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; margin-top: 5px; }

        /* Server List */
        .server-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .server-card {
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: transform 0.3s;
        }

        .server-card:hover { transform: translateY(-5px); }

        .server-header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border-color);
        }

        .server-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .server-body { padding: 20px; }
        .server-info { margin-bottom: 15px; font-size: 0.9rem; color: var(--text-dim); }
        .server-actions { display: flex; gap: 10px; }

        .btn {
            padding: 8px 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .btn-primary { background: var(--accent-blue); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-dim); }
        .btn-outline:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

        /* Modal Management */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--card-bg); width: 90%; max-width: 500px; padding: 30px;
            border-radius: 15px; border: 1px solid var(--border-color);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: var(--text-dim); margin-bottom: 8px; font-size: 0.9rem; }
        .form-group select, .form-group input {
            width: 100%; padding: 10px; background: var(--bg-dark); border: 1px solid var(--border-color);
            color: white; border-radius: 8px; outline: none;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .close-modal { cursor: pointer; font-size: 1.5rem; color: var(--text-dim); }

        /* Loading & Error */
        #loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-dark); display: flex; align-items: center;
            justify-content: center; z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="loader"><i class="fa-solid fa-circle-notch fa-spin fa-3x"></i></div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-logo">
            <i class="fa-solid fa-trident"></i> PoseidonUI
        </div>
        <ul class="nav-menu">
            <li class="nav-item active"><i class="fa-solid fa-chart-line"></i> Dashboard</li>
            <li class="nav-item"><i class="fa-solid fa-server"></i> Servidores</li>
            <li class="nav-item" onclick="viewLogs('global')"><i class="fa-solid fa-clock-rotate-left"></i> Logs Globales</li>
            <li class="nav-item" onclick="changeBotUrl()"><i class="fa-solid fa-gears"></i> Configurar API</li>
        </ul>
        <div class="reboot-btn" onclick="rebootBot()">
            <i class="fa-solid fa-power-off"></i> Reiniciar Bot
        </div>
        <div class="nav-item logout-btn" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
        </div>
    </aside>

    <main class="main-content">
        <div class="header-stats">
            <div class="stat-card">
                <div class="label">Servidores</div>
                <div class="value" id="stat-guilds">...</div>
            </div>
            <div class="stat-card">
                <div class="label">Usuarios Protegidos</div>
                <div class="value" id="stat-users">...</div>
            </div>
            <div class="stat-card">
                <div class="label">Ping de la API</div>
                <div class="value" id="stat-ping">...</div>
            </div>
            <div class="stat-card">
                <div class="label">Uptime</div>
                <div class="value" id="stat-uptime" style="font-size: 1.2rem;">...</div>
            </div>
        </div>

        <h2 style="margin-bottom: 25px;">Lista de Reinos (Servidores)</h2>
        <div class="server-grid" id="server-list">
            <!-- Servidores cargados dinámicamente -->
        </div>
    </main>

    <!-- Modal de Gestión -->
    <div id="manage-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-guild-name">Gestionar Servidor</h3>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <form id="config-form">
                <input type="hidden" id="edit-guild-id">
                <div class="form-group">
                    <label>Canal de Logs</label>
                    <select id="select-logs">
                        <option value="">Desactivado</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Rol de Staff</label>
                    <select id="select-staff">
                        <option value="">Ninguno</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tema Visual</label>
                    <select id="select-theme">
                        <option value="default">Por defecto</option>
                        <option value="ocean">Océano</option>
                        <option value="fire">Infierno</option>
                        <option value="nature">Naturaleza</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">Guardar Cambios</button>
            </form>
        </div>
    </div>

    <!-- Modal de Logs -->
    <div id="logs-modal" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h3 id="logs-title">Registros del Servidor</h3>
                <span class="close-modal" onclick="closeLogsModal()">&times;</span>
            </div>
            <div id="logs-container" style="max-height: 500px; overflow-y: auto; background: var(--bg-dark); padding: 15px; border-radius: 10px; font-family: monospace; font-size: 0.85rem;">
                <!-- Logs dinámicos -->
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('poseidon_token');
        if (!token) window.location.href = 'login.html';

        // URL del Bot: Se intenta leer de localStorage o se usa el host actual
        let BOT_URL = localStorage.getItem('poseidon_bot_url') || '';
        
        if (!BOT_URL && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
            // Si no hay URL guardada y estamos en producción (GitHub Pages), pedimos una
            const inputUrl = prompt("🔧 Configuración inicial:\nIngresa la URL de tu Bot (Ej: http://tu-ip:puerto):", "http://");
            if (inputUrl) {
                BOT_URL = inputUrl.replace(/\/$/, ""); // Quitar slash final
                localStorage.setItem('poseidon_bot_url', BOT_URL);
            }
        }

        async function apiFetch(endpoint) {
            const res = await fetch(`${BOT_URL}${endpoint}`, {
                headers: { 'Authorization': token }
            });
            if (res.status === 401) logout();
            return res.json();
        }

        function formatUptime(secs) {
            const h = Math.floor(secs / 3600);
            const m = Math.floor((secs % 3600) / 60);
            return `${h}h ${m}m activo`;
        }

        async function init() {
            try {
                const [stats, guilds] = await Promise.all([
                    apiFetch('/api/stats'),
                    apiFetch('/api/guilds')
                ]);

                // Stats
                document.getElementById('stat-guilds').innerText = stats.guilds_count;
                document.getElementById('stat-users').innerText = stats.users_count;
                document.getElementById('stat-ping').innerText = stats.latency + 'ms';
                document.getElementById('stat-uptime').innerText = formatUptime(stats.uptime_secs);

                // Guilds
                const list = document.getElementById('server-list');
                list.innerHTML = guilds.map(g => `
                    <div class="server-card">
                        <div class="server-header">
                            ${g.icon ? `<img src="${g.icon}" class="server-icon">` : `<div class="server-icon">${g.name[0]}</div>`}
                            <div>
                                <div style="font-weight: 700;">${g.name}</div>
                                <div style="font-size: 0.8rem; color: var(--text-dim);">${g.id}</div>
                            </div>
                        </div>
                        <div class="server-body">
                            <div class="server-info">
                                <div><i class="fa-solid fa-users"></i> ${g.members} miembros</div>
                                <div><i class="fa-solid fa-crown"></i> ${g.owner}</div>
                            </div>
                            <div class="server-actions">
                                <button class="btn btn-primary" onclick="manageGuild('${g.id}')">Gestionar</button>
                                <button class="btn btn-outline" onclick="viewLogs('${g.id}')">Ver Logs</button>
                            </div>
                        </div>
                    </div>
                `).join('');

                document.getElementById('loading-overlay').style.display = 'none';
            } catch (err) {
                console.error(err);
                alert('Error al conectar con el Olimpo. Revisa que el bot esté online.');
            }
        }

        async function manageGuild(guildId) {
            const data = await apiFetch(`/api/config/${guildId}`);
            
            document.getElementById('edit-guild-id').value = guildId;
            document.getElementById('modal-guild-name').innerText = `Gestionar ${data.name}`;
            
            // Llenar Canales
            const logSelect = document.getElementById('select-logs');
            logSelect.innerHTML = '<option value="">Desactivado</option>' + 
                data.channels.map(c => `<option value="${c.id}" ${data.config.log_channel_id == c.id ? 'selected' : ''}>#${c.name}</option>`).join('');
            
            // Llenar Roles
            const staffSelect = document.getElementById('select-staff');
            staffSelect.innerHTML = '<option value="">Ninguno</option>' + 
                data.roles.map(r => `<option value="${r.id}" ${data.config.staff_role_id == r.id ? 'selected' : ''}>@${r.name}</option>`).join('');
            
            // Tema
            document.getElementById('select-theme').value = data.config.theme || 'default';
            
            document.getElementById('manage-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('manage-modal').style.display = 'none';
        }

        async function viewLogs(guildId) {
            const container = document.getElementById('logs-container');
            const title = document.getElementById('logs-title');
            title.innerText = guildId === 'global' ? 'Registros Globales' : 'Registros del Servidor';
            container.innerHTML = '<div style="color: var(--text-dim);">Cargando pergaminos...</div>';
            document.getElementById('logs-modal').style.display = 'flex';

            try {
                const logs = await apiFetch(`/api/logs/${guildId}`);
                if (logs.length === 0) {
                    container.innerHTML = '<div style="color: var(--text-dim);">No hay registros recientes.</div>';
                    return;
                }

                container.innerHTML = logs.map(l => {
                    const time = new Date(l.timestamp).toLocaleTimeString();
                    const color = l.level === 'error' ? '#e74c3c' : (l.level === 'warn' ? '#f1c40f' : '#2ecc71');
                    return `<div style="margin-bottom: 8px; border-left: 3px solid ${color}; padding-left: 10px;">
                        <span style="color: var(--text-dim);">[${time}]</span> 
                        <span style="color: ${color}; font-weight: bold;">${l.kind.toUpperCase()}</span>: 
                        ${l.content}
                        ${guildId === 'global' ? `<br><small style="color: var(--text-dim);">Servidor: ${l.guild_name}</small>` : ''}
                    </div>`;
                }).join('');
            } catch (err) {
                container.innerHTML = '<div style="color: var(--accent-red);">Error al obtener los registros.</div>';
            }
        }

        function closeLogsModal() {
            document.getElementById('logs-modal').style.display = 'none';
        }

        async function rebootBot() {
            if (!confirm('🔱 ¿Estás seguro de que deseas reiniciar el bot? Se perderá la conexión por unos segundos.')) return;
            
            try {
                const res = await fetch(`${BOT_URL}/api/reboot`, {
                    method: 'POST',
                    headers: { 'Authorization': token }
                });
                if (res.ok) {
                    alert('🚀 Reiniciando... La página se recargará en 5 segundos.');
                    setTimeout(() => window.location.reload(), 5000);
                }
            } catch (err) {
                alert('❌ Error al solicitar reinicio.');
            }
        }

        document.getElementById('config-form').onsubmit = async (e) => {
            e.preventDefault();
            const guildId = document.getElementById('edit-guild-id').value;
            const updates = {
                log_channel_id: document.getElementById('select-logs').value,
                staff_role_id: document.getElementById('select-staff').value,
                theme: document.getElementById('select-theme').value
            };

            try {
                const res = await fetch(`${BOT_URL}/api/config/update`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ guild_id: guildId, updates })
                });

                if (res.ok) {
                    alert('🔱 Configuración guardada con éxito.');
                    closeModal();
                } else {
                    alert('❌ Error al guardar.');
                }
            } catch (err) {
                alert('❌ Error de conexión.');
            }
        };

        function logout() {
            localStorage.removeItem('poseidon_token');
            window.location.href = 'index.html';
        }

        function changeBotUrl() {
            const current = localStorage.getItem('poseidon_bot_url') || "";
            const newUrl = prompt("Actualizar URL del Bot API:", current);
            if (newUrl !== null) {
                localStorage.setItem('poseidon_bot_url', newUrl.replace(/\/$/, ""));
                window.location.reload();
            }
        }

        init();
    </script>
</body>
</html>
