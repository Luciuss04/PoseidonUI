<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>PoseidonUI - Acceso al Olimpo</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#cfbcff",
                        "primary-container": "#6200ea",
                        "surface": "#1a0c2c",
                        "surface-container": "#271839",
                        "on-surface": "#eedbff",
                        "on-surface-variant": "#cbc3d9",
                        "outline": "#958da2",
                        "error": "#ffb4ab"
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1a0c2c;
            color: #eedbff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }
        .glass-card {
            background: rgba(39, 24, 57, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(207, 188, 255, 0.1);
        }
        .purple-glow {
            box-shadow: 0 0 30px rgba(98, 0, 234, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="absolute inset-0 z-0">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_rgba(98,0,234,0.15)_0%,_transparent_70%)]"></div>
    </div>

    <div class="relative z-10 w-full max-w-md">
        <div class="glass-card rounded-3xl p-8 purple-glow">
            <div class="text-center mb-8">
                <div class="inline-flex items-center gap-3 mb-4">
                    <img alt="PoseidonUI Logo" class="h-10 w-auto" src="https://lh3.googleusercontent.com/aida/AP1WRLtV0Yc1NwwDmqsm1pRMrhJeW2exGBxpkdPPROy-aKCXp7I3tgeXjpwwpnpT4FkhA-EKt9v_21OYjqVtisosSiy5_3pMdBKiuti7E7HLiIEclswFn0iVL5f6yXu8WFNxkd10HPqBzJhG11lXMOxJbp4ZF-uvFQp8NgeJNh5ATThDmvceFVR2g4qdGPh9istkMwQhSeazVZzZTwiQ97QGIM_aIaSKc5Luobq0cIdgza1SP71VwIOZGIUK0BZF"/>
                    <span class="text-2xl font-black text-primary tracking-tight">PoseidonUI</span>
                </div>
                <h1 class="text-2xl font-bold text-on-surface">Bienvenido al Olimpo</h1>
                <p class="text-on-surface-variant mt-2">Identifícate para gestionar tu servidor</p>
            </div>

            <form onsubmit="doLogin(event)" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-on-surface-variant mb-2" for="username">Usuario</label>
                    <input class="w-full bg-surface-container border border-outline/20 rounded-xl px-4 py-3 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container transition-all" id="username" placeholder="Tu nombre de usuario" required="" type="text"/>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-on-surface-variant mb-2" for="password">Contraseña</label>
                    <input class="w-full bg-surface-container border border-outline/20 rounded-xl px-4 py-3 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container transition-all" id="password" placeholder="••••••••" required="" type="password"/>
                </div>

                <div id="error" class="hidden text-error text-sm text-center bg-error/10 py-2 rounded-lg border border-error/20">
                    Credenciales incorrectas
                </div>

                <button class="w-full bg-primary-container text-white py-4 rounded-xl font-bold hover:scale-[1.02] transition-all active:scale-95 shadow-lg shadow-primary-container/20" type="submit">
                    Entrar al Olimpo
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-outline/10 text-center">
                <a href="index.html" class="text-on-surface-variant hover:text-primary transition-colors text-sm flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-sm">arrow_back</span>
                    Volver al inicio
                </a>
            </div>
        </div>
    </div>

    <script>
        // Lógica de Login (Portado de la versión anterior)
        let BOT_URL = localStorage.getItem('poseidon_bot_url') || '';
        
        if (!BOT_URL && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
            const inputUrl = prompt("🔧 Configuración inicial:\nIngresa la URL de tu Bot (Ej: http://tu-ip:puerto):", "http://");
            if (inputUrl) {
                BOT_URL = inputUrl.replace(/\/$/, "");
                localStorage.setItem('poseidon_bot_url', BOT_URL);
            }
        } else if (!BOT_URL) {
            // Localhost fallback
            BOT_URL = window.location.origin;
        }

        async function doLogin(event) {
            event.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error');

            try {
                const response = await fetch(`${BOT_URL}/api/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: user, password: pass})
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('poseidon_token', data.token);
                    if (data.user) {
                        localStorage.setItem('poseidon_user', JSON.stringify(data.user));
                    }
                    window.location.href = 'admin.html';
                } else {
                    error.classList.remove('hidden');
                }
            } catch (err) {
                error.classList.remove('hidden');
                error.innerText = 'Error de conexión con el bot';
            }
        }
    </script>
</body>
</html>
