<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>PoseidonUI - Acceso al Olimpo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔱</text></svg>">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#cfbcff",
                        "primary-container": "#6200ea",
                        "surface": "#1a0c2c",
                        "surface-container": "#271839",
                        "on-surface": "#eedbff",
                        "on-surface-variant": "#cbc3d9",
                        "outline": "#958da2",
                        "error": "#ffb4ab"
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1a0c2c;
            color: #eedbff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(98, 0, 234, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(233, 196, 0, 0.1) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }
        .glass-card {
            background: rgba(39, 24, 57, 0.55);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(207, 188, 255, 0.2);
            transition: all 0.4s;
        }
        .glass-card:hover {
            border-color: rgba(207, 188, 255, 0.3);
            box-shadow: 0 25px 60px -25px rgba(98, 0, 234, 0.5);
        }
        .purple-glow {
            box-shadow: 0 0 40px rgba(98, 0, 234, 0.25);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-float {
            animation: float 5s ease-in-out infinite;
        }
        .discord-btn {
            background-color: #5865F2;
            transition: all 0.3s ease;
        }
        .discord-btn:hover {
            background-color: #4752C4;
            transform: scale(1.02);
        }
        .discord-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="absolute inset-0 z-0">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_rgba(98,0,234,0.15)_0%,_transparent_70%)]"></div>
    </div>

    <div class="relative z-10 w-full max-w-md animate-float">
        <div class="glass-card rounded-3xl p-8 purple-glow">
            <div class="text-center mb-8">
                <div class="inline-flex items-center gap-3 mb-4">
                    <svg class="h-10 w-10" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="#cfbcff"/>
                    </svg>
                    <span class="text-2xl font-black text-primary tracking-tight">PoseidonUI</span>
                </div>
                <h1 class="text-2xl font-bold text-on-surface mb-2">Bienvenido al Olimpo</h1>
                <p class="text-on-surface-variant">Inicia sesión con tu cuenta de Discord</p>
            </div>

            <button onclick="loginWithDiscord()" class="discord-btn w-full text-white py-4 rounded-xl font-bold flex items-center justify-center gap-3 shadow-lg">
                <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                </svg>
                Iniciar sesión con Discord
            </button>

            <div class="mt-8 pt-6 border-t border-outline/10 text-center">
                <a href="index.html" class="text-on-surface-variant hover:text-primary transition-colors text-sm flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-sm">arrow_back</span>
                    Volver al inicio
                </a>
            </div>
        </div>
    </div>

    <script>
        let BOT_URL = localStorage.getItem('poseidon_bot_url');
        
        if (!BOT_URL) {
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                BOT_URL = window.location.origin;
            } else {
                const inputUrl = prompt("🔧 Configuración inicial:\nIngresa la URL de tu Bot (Ej: http://tu-ip:puerto):", "http://localhost:8080");
                if (inputUrl) {
                    BOT_URL = inputUrl.replace(/\/$/, "");
                    localStorage.setItem('poseidon_bot_url', BOT_URL);
                }
            }
        }

        function loginWithDiscord() {
            if (!BOT_URL) {
                alert("Por favor configura la URL del bot primero.");
                return;
            }
            window.location.href = `${BOT_URL}/api/oauth/discord`;
        }
    </script>
</body>
</html>
